# Configuration Alembic pour polycopy (M4+).
#
# L'URL de la DB n'est PAS définie ici : `alembic/env.py` la lit depuis
# `polycopy.config.Settings` (et donc depuis l'env `.env`) pour rester
# la seule source de vérité. Voir aussi `docs/setup.md` §10.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
